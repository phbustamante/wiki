<!doctype html>
<html lang="pt-BR" class="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/jimi-favicon.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>Automação de Comandos — Equipamentos JIMI</title>
    <script>
      // Evita flash de tema incorreto antes do React montar.
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem("aceq-store") || "{}");
          var theme = (stored.state && stored.state.theme) || "system";
          var dark =
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
