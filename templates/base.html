<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Central de Automação JIMI{% endblock %}</title>
  <link rel="icon" href="/static/img/jimi-favicon.jpeg" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["-apple-system","BlinkMacSystemFont",'"SF Pro Display"','"Segoe UI"',"Inter","system-ui","sans-serif"],
            mono: ['"SF Mono"',"ui-monospace","SFMono-Regular","Menlo","Monaco","Consolas","monospace"],
          },
          colors: {
            border:     "hsl(var(--border) / <alpha-value>)",
            input:      "hsl(var(--input) / <alpha-value>)",
            ring:       "hsl(var(--ring) / <alpha-value>)",
            background: "hsl(var(--background) / <alpha-value>)",
            foreground: "hsl(var(--foreground) / <alpha-value>)",
            muted:   { DEFAULT: "hsl(var(--muted) / <alpha-value>)", foreground: "hsl(var(--muted-foreground) / <alpha-value>)" },
            card:    { DEFAULT: "hsl(var(--card) / <alpha-value>)",  foreground: "hsl(var(--card-foreground) / <alpha-value>)" },
            primary: { DEFAULT: "hsl(var(--primary) / <alpha-value>)", foreground: "hsl(var(--primary-foreground) / <alpha-value>)" },
            accent:  { DEFAULT: "hsl(var(--accent) / <alpha-value>)", foreground: "hsl(var(--accent-foreground) / <alpha-value>)" },
          },
          borderRadius: { "2xl": "1.25rem", "3xl": "1.75rem" },
          boxShadow: {
            soft:    "0 1px 2px hsl(var(--shadow)/.04),0 8px 24px -8px hsl(var(--shadow)/.12)",
            "soft-lg":"0 1px 3px hsl(var(--shadow)/.05),0 20px 48px -12px hsl(var(--shadow)/.18)",
          },
          keyframes: {
            "fade-in": { from: { opacity:"0", transform:"translateY(6px)" }, to: { opacity:"1", transform:"translateY(0)" } },
          },
          animation: { "fade-in": "fade-in 0.35s cubic-bezier(0.22,1,0.36,1)" },
        },
      },
    };
  </script>
  <style type="text/tailwindcss">
    @layer base {
      :root {
        --background:240 20% 99%;--foreground:240 10% 6%;
        --card:0 0% 100%;--card-foreground:240 10% 6%;
        --muted:240 12% 95%;--muted-foreground:240 5% 45%;
        --primary:211 100% 50%;--primary-foreground:0 0% 100%;
        --accent:240 12% 96%;--accent-foreground:240 10% 10%;
        --border:240 10% 90%;--input:240 10% 90%;--ring:211 100% 50%;
        --shadow:240 30% 20%;
      }
      .dark {
        --background:240 10% 5%;--foreground:0 0% 98%;
        --card:240 8% 9%;--card-foreground:0 0% 98%;
        --muted:240 6% 15%;--muted-foreground:240 5% 60%;
        --primary:211 100% 55%;--primary-foreground:0 0% 100%;
        --accent:240 6% 16%;--accent-foreground:0 0% 98%;
        --border:240 6% 18%;--input:240 6% 20%;--ring:211 100% 55%;
        --shadow:0 0% 0%;
      }
      * { border-color: hsl(var(--border)); }
      html { -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
      body { background-color:hsl(var(--background)); color:hsl(var(--foreground)); }
      ::selection { background-color:hsl(var(--primary)/.2); }
    }
    @layer utilities {
      .scroll-thin::-webkit-scrollbar { width:8px; height:8px; }
      .scroll-thin::-webkit-scrollbar-thumb { background:hsl(var(--muted-foreground)/.25); border-radius:9999px; }
      .scroll-thin::-webkit-scrollbar-thumb:hover { background:hsl(var(--muted-foreground)/.4); }
      .scroll-thin::-webkit-scrollbar-track { background:transparent; }
    }
  </style>

  <script src="/static/js/app.js"></script>
  <script defer src="/static/js/alpine.min.js"></script>
</head>

<body class="min-h-screen font-sans antialiased">

  <!-- Cabeçalho -->
  <header class="sticky top-0 z-40 border-b border-black/10 bg-[#1B75D2] shadow-soft">
    <div class="flex h-28 w-full items-center justify-between px-4 sm:px-6 lg:px-8">
      <a href="/" class="flex items-center gap-4 rounded-2xl focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white">
        <img src="/static/img/jimi-logo.png" alt="jimiiot" class="h-20 w-20 object-contain sm:h-28 sm:w-28" />
        <span class="hidden text-xl font-bold tracking-tight text-white sm:block">
          Central de Automação JIMI
        </span>
      </a>

      <!-- Alternador de tema -->
      <div x-data
           role="radiogroup" aria-label="Tema"
           class="inline-flex items-center gap-0.5 rounded-full border border-border bg-card p-0.5 shadow-soft">
        <!-- Claro -->
        <button @click="$store.app.setTheme('light')" title="Claro" role="radio"
                :aria-checked="$store.app.theme==='light'"
                :class="$store.app.theme==='light' ? 'bg-accent text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'"
                class="flex h-7 w-7 items-center justify-center rounded-full transition-all duration-200">
          <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </button>
        <!-- Sistema -->
        <button @click="$store.app.setTheme('system')" title="Sistema" role="radio"
                :aria-checked="$store.app.theme==='system'"
                :class="$store.app.theme==='system' ? 'bg-accent text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'"
                class="flex h-7 w-7 items-center justify-center rounded-full transition-all duration-200">
          <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>
        </button>
        <!-- Escuro -->
        <button @click="$store.app.setTheme('dark')" title="Escuro" role="radio"
                :aria-checked="$store.app.theme==='dark'"
                :class="$store.app.theme==='dark' ? 'bg-accent text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'"
                class="flex h-7 w-7 items-center justify-center rounded-full transition-all duration-200">
          <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Conteúdo principal -->
  <main class="mx-auto max-w-6xl animate-fade-in px-4 py-8 sm:px-6 sm:py-10">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
